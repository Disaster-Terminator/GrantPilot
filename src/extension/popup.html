<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <title>GrantPilot</title>
  </head>
  <body>
    <main>
      <header>
        <h1>GrantPilot</h1>
        <span id="status" class="status">Loading</span>
      </header>

      <label class="row">
        <span>
          <strong>Enabled</strong>
          <small>Only clicks approval cards on ChatGPT conversations</small>
        </span>
        <input id="enabled" type="checkbox">
      </label>

      <label class="row">
        <span>
          <strong>Auto refresh</strong>
          <small>Reloads idle conversation pages by cadence</small>
        </span>
        <input id="autoRefresh" type="checkbox">
      </label>

      <label class="field">
        <span>
          <strong>Refresh cadence</strong>
          <small>Only after conversation activity. Uses random jitter.</small>
        </span>
        <select id="refreshIntervalMs">
          <option value="10000">Fast: about 10s</option>
          <option value="20000">Normal: about 20s</option>
          <option value="30000">Relaxed: about 30s</option>
        </select>
      </label>

      <label class="row">
        <span>
          <strong>Local JSONL log</strong>
          <small>Requires the debug log server</small>
        </span>
        <input id="logToLocalServer" type="checkbox">
      </label>

      <section class="panel">
        <h2>Last issue</h2>
        <p id="lastIssue">None</p>
      </section>

      <section class="panel">
        <h2>Recent events</h2>
        <ol id="events"></ol>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
